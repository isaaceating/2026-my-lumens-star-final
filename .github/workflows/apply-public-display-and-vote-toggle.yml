name: Apply public display and vote controls

# Trigger revision: 2026-07-15
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-public-display-and-vote-toggle.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update final display and expectation vote controls
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_required(path, old, new):
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Required text not found in {path}: {old[:120]!r}")
              p.write_text(text.replace(old, new), encoding="utf-8")

          # Final-results page: automatically use Firebase Anonymous Auth instead of Admin login.
          p = Path("final-results.js")
          text = p.read_text(encoding="utf-8")
          text = text.replace(
              'import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";',
              'import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";'
          )
          text = text.replace(
              'import { getFirestore, collection, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";',
              'import { getFirestore, collection, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";'
          )
          text = text.replace('const provider = new GoogleAuthProvider();\n', '')

          old_init = '''function init() {
            setupVoteUrl();

            resultsLoginButton?.addEventListener("click", async () => {
              try {
                setLoginMessage("Google 登入中...");
                await signInWithPopup(auth, provider);
              } catch (error) {
                setLoginMessage(`登入失敗：${error.message}`);
              }
            });

            onAuthStateChanged(auth, async (user) => {
              if (!user) {
                showLoginScreen("請使用 Admin Google 帳號登入後再投影。");
                return;
              }

              const adminResult = await checkAdmin(user.uid);

              if (!adminResult) {
                showLoginScreen("此帳號沒有 Admin 權限，無法讀取決賽即時資料。");
                return;
              }

              showDisplayScreen();

              if (!hasStartedSnapshots) {
                hasStartedSnapshots = true;
                startSnapshots();
              }
            });
          }

          async function checkAdmin(uid) {
            try {
              const adminSnap = await getDoc(doc(db, "admins", uid));
              return adminSnap.exists() && adminSnap.data().role === "admin";
            } catch (error) {
              setLoginMessage(`管理員驗證失敗：${error.message}`);
              return false;
            }
          }
'''
          new_init = '''function init() {
            setupVoteUrl();
            showDisplayScreen();

            onAuthStateChanged(auth, async (user) => {
              if (!user) {
                try {
                  setLoginMessage("正在連線決賽即時資料...");
                  await signInAnonymously(auth);
                } catch (error) {
                  console.error("Final display anonymous auth failed:", error);
                  showLoginScreen(`即時資料連線失敗：${error.message}`);
                }
                return;
              }

              showDisplayScreen();

              if (!hasStartedSnapshots) {
                hasStartedSnapshots = true;
                startSnapshots();
              }
            });
          }
'''
          if old_init not in text:
              raise SystemExit("final-results.js auth block did not match expected source")
          p.write_text(text.replace(old_init, new_init), encoding="utf-8")

          replace_required(
              "final-results.html",
              '<section id="resultsLoginScreen" class="results-login-screen">',
              '<section id="resultsLoginScreen" class="results-login-screen hidden">'
          )
          replace_required(
              "final-results.html",
              '<section id="resultsDisplayScreen" class="results-display-screen hidden">',
              '<section id="resultsDisplayScreen" class="results-display-screen">'
          )
          replace_required(
              "final-results.html",
              '此頁會讀取即時投票資料，請使用 Admin Google 帳號登入後再投影。',
              '正在連線決賽即時資料，請稍候。'
          )

          # Expectation vote: let Admin override the historical closing date at any time.
          for filename in ("admin.js", "expect-vote.js"):
              p = Path(filename)
              text = p.read_text(encoding="utf-8")
              text = text.replace(
                  'const EXPECT_VOTE_AUTO_CLOSE_TIME = new Date("2026-07-13T00:00:00+08:00");',
                  'const EXPECT_VOTE_AUTO_CLOSE_TIME = null; // Admin-controlled; no permanent date lock.'
              )
              text = text.replace(
                  'const isPastAutoCloseTime = now >= EXPECT_VOTE_AUTO_CLOSE_TIME;',
                  'const isPastAutoCloseTime = Boolean(EXPECT_VOTE_AUTO_CLOSE_TIME && now >= EXPECT_VOTE_AUTO_CLOSE_TIME);'
              )
              text = text.replace(
                  'if (now >= EXPECT_VOTE_AUTO_CLOSE_TIME) {',
                  'if (EXPECT_VOTE_AUTO_CLOSE_TIME && now >= EXPECT_VOTE_AUTO_CLOSE_TIME) {'
              )
              p.write_text(text, encoding="utf-8")

          replace_required(
              "admin.html",
              '控制前台最期待歌手票選是否可以送出投票。系統會在 2026/7/13\n                  00:00 自動視為關閉。',
              '控制前台最期待歌手票選是否可以送出投票。Admin 可依活動流程隨時手動開啟或關閉。'
          )
          PY

      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add final-results.js final-results.html admin.js admin.html expect-vote.js
          git commit -m "feat: remove display admin login and add manual vote toggle"
          git push
